version: 2.1

orbs:
  artifacts: ustudio/backup-artifacts@1.0.3
parameters:
  node_version:
    type: string
    default: "24.18"
jobs:
  test:
    docker:
      - image: cimg/node:<< pipeline.parameters.node_version >>

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-node-<< pipeline.parameters.node_version >>-{{ checksum "yarn.lock" }}

      - run:
          name: Install Dependencies
          command: |
            corepack enable --install-directory ~/bin
            yarn

      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-node-<< pipeline.parameters.node_version >>-{{ checksum "yarn.lock" }}

      - run:
          name: Run Tests
          command: |
            yarn test

      - run:
          name: Lint Source
          command: |
            yarn lint

  build:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      - run:
          name: Create Artifact
          command: |
            mkdir -p dist
            cp example.js dist/example-${CIRCLE_BRANCH//\//-}-${CIRCLE_BUILD_NUM}.js

      - artifacts/backup_artifacts:
          path: dist

workflows:
  version: 2
  test:
    jobs:
      - test
      - build:
          requires:
            - test
          context:
            - backup-artifacts
